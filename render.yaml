services:
  - type: web
    name: trainees-accounting-system
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: trainees_db
    plan: free
    mysqlVersion: "8"
